site_name: PyThermoDB
nav:
  - "🏠 Home": index.md
  - "🚀 Quickstart": quickstart.md
  - "📘 Comprehensive Walkthrough": comprehensive-walkthrough.md
  - "⚙️ Core Workflows": core-workflows.md
  - "🧠 Package Logic": package-logic.md
  - "📝 README Highlights": readme-highlights.md
  - "🧩 Custom References": custom-references.md
  - "🧪 Matrix & Mixture Data": matrix-mixture.md
  - "📐 Constants": constants.md
  - "🏗️ ThermoDB Build APIs": thermodb-build-apis.md
  - "📚 API Reference": api-reference.md
  - "🗂️ Examples Map": examples.md
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
  language: en
  palette:
    - scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
      primary: blue
      accent: orange
    - scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
      primary: blue
      accent: yellow

plugins:
  # - social
  - search
  - mkdocstrings

# extra:
#   social:
#     - icon: fontawesome/brands/github-alt
#       link: https://github.com/sinagilassi
#     - icon: fontawesome/brands/linkedin
#       link: https://www.linkedin.com/in/sina-gilassi

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg


copyright: |
